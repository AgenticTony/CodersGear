name: Build, publish and deploy to SmarterASP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: dotnet restore CodersGear/CodersGear/CodersGear.csproj

      - name: Build
        run: dotnet build CodersGear/CodersGear/CodersGear.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish CodersGear/CodersGear/CodersGear.csproj --configuration Release --output ./publish

      - name: Sync files to SmarterASP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SMARTASP_FTP_SERVER }}
          username: ${{ secrets.SMARTASP_USERNAME }}
          password: ${{ secrets.SMARTASP_PASSWORD }}
          local-dir: ./publish/
          server-dir: ./codersgear/
