name: Build, publish and deploy to SmarterASP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore CodersGear/CodersGear.csproj

      - name: Build
        run: dotnet build CodersGear/CodersGear.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish CodersGear/CodersGear.csproj --configuration Release --output ./publish

      - name: Install Web Deploy
        shell: pwsh
        run: |
          choco install webdeploy -y

      - name: Deploy to SmarterASP via Web Deploy
        shell: pwsh
        run: |
          $sourcePath = "${{ github.workspace }}\publish"
          $siteName = "anthonyforan-001-site1"
          $computerName = "https://win6187.site4now.net:8172/MsDeploy.axd?site=$siteName"
          $username = "${{ secrets.SMARTASP_USERNAME }}"
          $password = "${{ secrets.SMARTASP_PASSWORD }}"

          Write-Host "Deploying to SmarterASP..."

          & "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" `
            -verb:sync `
            -source:contentPath="$sourcePath" `
            -dest:contentPath="$siteName",ComputerName="$computerName",UserName="$username",Password="$password",AuthType="Basic" `
            -allowUntrusted `
            -verbose

          Write-Host "Deployment complete!"
