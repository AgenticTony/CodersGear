name: Build, publish and deploy to SmarterASP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore CodersGear/CodersGear.csproj

      - name: Build
        run: dotnet build CodersGear/CodersGear.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish CodersGear/CodersGear.csproj --configuration Release --output ./publish

      - name: Deploy to SmarterASP via FTP (PowerShell)
        shell: pwsh
        env:
          FTP_SERVER: ${{ secrets.SMARTASP_FTP_SERVER }}
          FTP_USER: ${{ secrets.SMARTASP_USERNAME }}
          FTP_PASS: ${{ secrets.SMARTASP_PASSWORD }}
        run: |
          $localPath = "${{ github.workspace }}\publish\*"

          Write-Host "Connecting to FTP server: $env:FTP_SERVER"

          # Create FTP script
          $ftpScript = @"
          open $env:FTP_SERVER
          user $env:FTP_USER $env:FTP_PASS
          binary
          prompt
          mput $localPath
          bye
          "@

          $ftpScript | Out-File -FilePath "ftp_script.txt" -Encoding ASCII

          # Try FTP connection
          Write-Host "Uploading files..."

          # Use WebClient for FTP upload
          $files = Get-ChildItem -Path "${{ github.workspace }}\publish" -Recurse
          $webClient = New-Object System.Net.WebClient
          $webClient.Credentials = New-Object System.Net.NetworkCredential($env:FTP_USER, $env:FTP_PASS)

          foreach ($file in $files) {
            if (-not $file.PSIsContainer) {
              $relativePath = $file.FullName.Substring("${{ github.workspace }}\publish".Length)
              $ftpPath = "ftp://$env:FTP_SERVER/wwwroot$relativePath".Replace("\", "/")
              Write-Host "Uploading: $($file.Name)"
              try {
                $webClient.UploadFile($ftpPath, $file.FullName)
              } catch {
                Write-Host "Error uploading $($file.Name): $_"
              }
            }
          }

          Write-Host "Deployment complete!"
